<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudentBuddy AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="navbar">
    <div class="logo">StudentBuddy AI</div>

    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <button class="theme-toggle" onclick="toggleDarkMode()" title="Toggle dark mode">🌙</button>
    </div>
  </nav>

  <section class="hero">
    <div class="deadline-banner" id="deadlineBanner">
      <span></span>
      <div>
        <small>Upcoming Deadline</small>
        <p id="deadlineText">No reminders yet. Add your first task.</p>
      </div>
    </div>

    <h1>Stay organized. Study smarter.</h1>
    <p>Your personal AI, StudentBuddy, an academic assistant for university life.</p>

    <div class="ai-response" id="aiResponse"></div>

    <div class="ai-box">
      <textarea
        id="aiInput"
        placeholder="Ask StudentBuddy anything..."
      ></textarea>

      <div class="ai-bottom">
        <div class="left-icons">
          <button onclick="fillPrompt('Help me plan my study schedule')">+</button>
          <button onclick="fillPrompt('Give me productivity tips for students')">🌐</button>
        </div>

        <button class="send-btn" onclick="sendAIMessage()">↑</button>
      </div>
    </div>
  </section>

  <footer>
    Built to guide students • StudentBuddy AI BY NULL
  </footer>

  <script src="script.js"></script>
</body>
</html>
